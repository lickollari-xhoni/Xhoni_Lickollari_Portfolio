services:
  - type: web
    name: portfolio-xhoni
    runtime: php
    buildCommand: "composer install --no-dev && npm install && npm run build"
    startCommand: "php -S 0.0.0.0:$PORT -t public"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generate: true